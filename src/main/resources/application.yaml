spring:
  application:
    name: smartrecrutare
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:smartrecrutare}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    # driver pentru aws
    driver-class-name: org.postgresql.Driver

  jpa:
    # se rezolva problema
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: recrutare
    show-sql: true

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
logging:
  config: classpath:logback-spring.xml
