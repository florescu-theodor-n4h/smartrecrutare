spring:
  application:
    name: smartrecrutare
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:smartrecrutare}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    # driver pentru aws
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: recrutare
    show-sql: true

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # Provider: Auth0
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-hqeowpbz7cmw3n3m.us.auth0.com
          audiences:
            - mjMWbQgLWxFrLAmMrtfni5CjQhOQRaTK
logging:
  config: classpath:logback-spring.xml
  #level:
    #root: DEBUG
    #com.samplus.smartrecrutare: DEBUG
    #org.hibernate: DEBUG
    #org.hibernate.SQL: DEBUG
    #org.hibernate.orm.jdbc.bind: TRACE


#server:
#  port: 8080

auth0:
  domain: YOUR_TENANT.eu.auth0.com
  client-id: YOUR_AUTH0_CLIENT_ID
  client-secret: YOUR_AUTH0_CLIENT_SECRET
  audience: https://your-api
  redirect-uri: http://localhost:8080/auth/callback
  vue-redirect-uri: http://localhost:5173
  jar:
    key-id: YOUR_AUTH0_JAR_KEY_ID
    private-key-location: classpath:local-secrets/auth0-jar-private-key.pem
    public-key-location: classpath:local-secrets/auth0-jar-public-key.pem

local-auth:
  enabled: ${LOCAL_AUTH_ENABLED:false}
  issuer: ${LOCAL_AUTH_ISSUER:smartrecrutare-local}
  secret: ${LOCAL_AUTH_JWT_SECRET:}
  access-token-minutes: ${LOCAL_AUTH_ACCESS_TOKEN_MINUTES:60}
