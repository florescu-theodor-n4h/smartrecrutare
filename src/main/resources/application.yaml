spring:
  application:
    name: smartrecrutare
  datasource:
    url: jdbc:${DB_TYPE:postgresql}://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartrecrutare}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    # driver pentru aws
    driver-class-name: ${DB_CLASS:org.postgresql.Driver}

  jpa:
    #database-platform: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.${DB_DIALECT:PostgreSQLDialect}

    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: recrutare
    show-sql: true

  #<!--mvc:
  #  throw-exception-if-no-handler-found: true-->
  web:
    resources:
      add-mappings: false

  # Provider: Auth0
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-hqeowpbz7cmw3n3m.us.auth0.com
          audiences:
            - mjMWbQgLWxFrLAmMrtfni5CjQhOQRaTK
logging:
