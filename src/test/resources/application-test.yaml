spring:
  datasource:
    url: jdbc:h2:mem:smartrecrutare;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: PUBLIC
    show-sql: false

local-auth:
  enabled: true
  issuer: smartrecrutare-local-test
  secret: test-local-auth-secret-32-characters-minimum
  access-token-minutes: 30
